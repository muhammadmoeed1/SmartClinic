name: Keep-Alive

# Render's free web service spins down after ~15 minutes of inactivity, causing
# a slow (~50s) cold start on the next request. This pings the health endpoint
# every 14 minutes so the live demo stays warm for anyone who clicks the link.
#
# Setup: add a repository variable BACKEND_URL (Settings → Secrets and variables
# → Actions → Variables) set to your Render URL, e.g. https://smartclinic-api.onrender.com
# If BACKEND_URL is not set, the job no-ops quietly.

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL not configured — skipping keep-alive."
            exit 0
          fi
          echo "Pinging $BACKEND_URL/health"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$BACKEND_URL/health" || echo "000")
          echo "HTTP $code"
